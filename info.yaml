# Tiny Tapeout project information
project:
  title:        "picosoc_Example"      # Project title
  author:       "Ruhai Lin"      # Your name
  discord:      "Ruhai Lin"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A picosoc example"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "8x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_picosoc"

  # List your project's source files here. picosoc.v must be before picorv32.v (macro order).
  # Also include the 64B SRAM Verilog model used for simulation.
  source_files:
    - "picosoc.v"
    - "picorv32.v"
    - "spimemio.v"
    - "simpleuart.v"
    - "spiflash.v"
    - "tt_um_picosoc.v"
    - "macros/sky130_sram_1rw_tiny.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs (ui: UART RX + Flash MISO-style data in)
  ui[0]: "UART_RX"
  ui[1]: "FLASH_IO0_DI"
  ui[2]: "FLASH_IO1_DI"
  ui[3]: "FLASH_IO2_DI"
  ui[4]: "FLASH_IO3_DI"
  ui[5]: "UNUSED"
  ui[6]: "UNUSED"
  ui[7]: "UNUSED"

  # Outputs (uo: UART TX + Flash control)
  uo[0]: "UART_TX"
  uo[1]: "FLASH_CSB"
  uo[2]: "FLASH_CLK"
  uo[3]: "FLASH_IO0_OE"
  uo[4]: "FLASH_IO1_OE"
  uo[5]: "FLASH_IO2_OE"
  uo[6]: "FLASH_IO3_OE"
  uo[7]: "FLASH_IO0_DO"

  # Bidirectional (flash data out)
  uio[0]: "FLASH_IO1_DO"
  uio[1]: "FLASH_IO2_DO"
  uio[2]: "FLASH_IO3_DO"
  uio[3]: "UNUSED"
  uio[4]: "UNUSED"
  uio[5]: "UNUSED"
  uio[6]: "UNUSED"
  uio[7]: "UNUSED"

# Do not change!
yaml_version: 6
